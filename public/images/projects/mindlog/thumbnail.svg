<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16163a;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="240"/>
  </g>

  <!-- Phone frame -->
  <rect x="40" y="20" width="110" height="200" rx="14" ry="14" fill="url(#card)" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <!-- Phone notch -->
  <rect x="75" y="24" width="40" height="8" rx="4" fill="#0f0f1a"/>
  <!-- Phone screen content -->
  <!-- Entry list items -->
  <rect x="52" y="46" width="86" height="28" rx="6" fill="#252550" opacity="0.8"/>
  <circle cx="63" cy="60" r="7" fill="#7c3aed" opacity="0.7"/>
  <rect x="74" y="54" width="55" height="5" rx="2" fill="#a855f7" opacity="0.6"/>
  <rect x="74" y="63" width="38" height="4" rx="2" fill="#ffffff" opacity="0.2"/>

  <rect x="52" y="80" width="86" height="28" rx="6" fill="#252550" opacity="0.8"/>
  <circle cx="63" cy="94" r="7" fill="#06b6d4" opacity="0.7"/>
  <rect x="74" y="88" width="42" height="5" rx="2" fill="#67e8f9" opacity="0.6"/>
  <rect x="74" y="97" width="55" height="4" rx="2" fill="#ffffff" opacity="0.2"/>

  <rect x="52" y="114" width="86" height="28" rx="6" fill="#252550" opacity="0.8"/>
  <circle cx="63" cy="128" r="7" fill="#f59e0b" opacity="0.7"/>
  <rect x="74" y="122" width="50" height="5" rx="2" fill="#fbbf24" opacity="0.6"/>
  <rect x="74" y="131" width="35" height="4" rx="2" fill="#ffffff" opacity="0.2"/>

  <!-- Bottom nav bar -->
  <rect x="40" y="190" width="110" height="30" rx="0" ry="0" fill="#13132a" opacity="0.95"/>
  <rect x="40" y="190" width="110" height="30" rx="0 0 14px 14px" fill="#13132a" opacity="0.95"/>
  <circle cx="68" cy="205" r="5" fill="#7c3aed" opacity="0.8"/>
  <circle cx="95" cy="205" r="5" fill="#ffffff" opacity="0.25"/>
  <circle cx="122" cy="205" r="5" fill="#ffffff" opacity="0.25"/>

  <!-- Chat panel -->
  <rect x="172" y="20" width="188" height="200" rx="12" fill="url(#card)" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>

  <!-- Chat header -->
  <rect x="172" y="20" width="188" height="36" rx="12" fill="#1a1a35"/>
  <rect x="172" y="44" width="188" height="12" fill="#1a1a35"/>
  <text x="216" y="41" font-family="monospace" font-size="11" fill="#a855f7" opacity="0.9">MindLog IA</text>
  <circle cx="345" cy="38" r="5" fill="#22c55e" opacity="0.8"/>

  <!-- Chat bubbles user -->
  <rect x="222" y="66" width="126" height="24" rx="10" fill="#7c3aed" opacity="0.85"/>
  <text x="230" y="82" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.9">¿Cómo me sentí en marzo?</text>

  <!-- Chat bubbles AI -->
  <rect x="182" y="100" width="148" height="36" rx="10" fill="#252555" opacity="0.9"/>
  <text x="190" y="114" font-family="monospace" font-size="7.5" fill="#d8b4fe" opacity="0.9">En marzo escribiste 12 entradas.</text>
  <text x="190" y="127" font-family="monospace" font-size="7.5" fill="#d8b4fe" opacity="0.8">El mood dominante fue 'grato'...</text>

  <!-- Streaming dots -->
  <g filter="url(#glow)">
    <circle cx="188" cy="152" r="3" fill="#a855f7" opacity="0.9"/>
    <circle cx="198" cy="152" r="3" fill="#a855f7" opacity="0.6"/>
    <circle cx="208" cy="152" r="3" fill="#a855f7" opacity="0.3"/>
  </g>
  <text x="218" y="156" font-family="monospace" font-size="7" fill="#7c3aed" opacity="0.7">streaming...</text>

  <!-- Mood indicators -->
  <rect x="182" y="170" width="168" height="22" rx="6" fill="#1e1e40" opacity="0.8"/>
  <text x="188" y="184" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.4">mood detectado:</text>
  <rect x="263" y="173" width="36" height="16" rx="4" fill="#7c3aed" opacity="0.7"/>
  <text x="270" y="184" font-family="monospace" font-size="7.5" fill="#ffffff" opacity="0.95">grato</text>
  <rect x="303" y="173" width="40" height="16" rx="4" fill="#0891b2" opacity="0.6"/>
  <text x="309" y="184" font-family="monospace" font-size="7.5" fill="#ffffff" opacity="0.9">calmo</text>

  <!-- Input bar -->
  <rect x="182" y="198" width="168" height="18" rx="9" fill="#252550" opacity="0.8"/>
  <text x="192" y="210" font-family="monospace" font-size="7" fill="#ffffff" opacity="0.25">Escribe algo...</text>
  <circle cx="342" cy="207" r="6" fill="url(#accent)" opacity="0.9"/>

  <!-- Title -->
  <text x="20" y="232" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.5" letter-spacing="2">MINDLOG</text>
  <text x="88" y="232" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.2">· Expo · FastAPI · Claude API</text>
</svg>
