<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="50%" style="stop-color:#1A4A7A"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Auth flow: login → JWT → API -->
  <rect x="60" y="60" width="110" height="44" rx="8" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.6)" stroke-width="1.5"/>
  <text x="115" y="87" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.95)" text-anchor="middle">POST /login</text>
  <line x1="170" y1="82" x2="240" y2="82" stroke="rgba(96,165,250,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="240" y="60" width="100" height="44" rx="8" fill="rgba(96,165,250,0.25)" stroke="rgba(96,165,250,0.7)" stroke-width="1.5"/>
  <text x="290" y="87" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.95)" text-anchor="middle">JWT token</text>
  <line x1="340" y1="82" x2="410" y2="82" stroke="rgba(96,165,250,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="410" y="60" width="130" height="44" rx="8" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.6)" stroke-width="1.5"/>
  <text x="475" y="87" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.95)" text-anchor="middle">Bearer access</text>
  <line x1="540" y1="82" x2="610" y2="82" stroke="rgba(96,165,250,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="610" y="60" width="120" height="44" rx="8" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.6)" stroke-width="1.5"/>
  <text x="670" y="87" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.95)" text-anchor="middle">POST /logout</text>

  <!-- Architecture layers -->
  <rect x="60" y="140" width="680" height="200" rx="10" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="167" font-family="monospace" font-size="12" fill="rgba(147,197,253,0.7)"># Arquitectura por capas</text>

  <text x="80" y="195" font-family="monospace" font-size="12" fill="rgba(147,197,253,0.9)">View</text>
  <text x="140" y="195" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)">→</text>
  <text x="165" y="195" font-family="monospace" font-size="12" fill="rgba(147,197,253,0.9)">Service</text>
  <text x="245" y="195" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)">→</text>
  <text x="270" y="195" font-family="monospace" font-size="12" fill="rgba(147,197,253,0.9)">Repository</text>
  <text x="390" y="195" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)">→</text>
  <text x="415" y="195" font-family="monospace" font-size="12" fill="rgba(147,197,253,0.9)">ORM</text>

  <text x="80" y="225" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.7)">GET  /api/notes/?archived=false</text>
  <text x="80" y="249" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.7)">POST /api/notes/</text>
  <text x="80" y="273" font-family="monospace" font-size="12" fill="rgba(250,204,21,0.75)">PATCH /api/notes/&lt;id&gt;/archive/</text>
  <text x="80" y="297" font-family="monospace" font-size="12" fill="rgba(96,165,250,0.7)">GET  /api/categories/</text>
  <text x="400" y="225" font-family="monospace" font-size="12" fill="rgba(52,211,153,0.8)">✓  notes privadas por usuario</text>
  <text x="400" y="249" font-family="monospace" font-size="12" fill="rgba(52,211,153,0.8)">✓  refresh token blacklist</text>
  <text x="400" y="273" font-family="monospace" font-size="12" fill="rgba(52,211,153,0.8)">✓  categorías por nota</text>
  <text x="400" y="297" font-family="monospace" font-size="12" fill="rgba(52,211,153,0.8)">✓  archivado sin eliminar</text>

  <!-- Tech badges -->
  <rect x="60" y="370" width="90" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="105" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">Django 4.2</text>

  <rect x="164" y="370" width="90" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="209" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">React 18</text>

  <rect x="268" y="370" width="90" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="313" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">simplejwt</text>

  <rect x="372" y="370" width="100" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="422" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">PostgreSQL 16</text>

  <rect x="486" y="370" width="70" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="521" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">Docker</text>

  <rect x="570" y="370" width="70" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="605" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">Railway</text>

  <rect x="654" y="370" width="70" height="28" rx="6" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
  <text x="689" y="389" font-family="monospace" font-size="11" fill="rgba(147,197,253,0.9)" text-anchor="middle">Vercel</text>

  <!-- Title -->
  <text x="400" y="470" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">Notes App</text>
  <text x="400" y="512" font-family="system-ui, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)" text-anchor="middle">Full-stack · JWT Auth · REST API</text>
  <text x="400" y="548" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="middle">Django · React · PostgreSQL</text>
</svg>
